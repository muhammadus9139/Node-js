<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#2563eb);
        }

        .container{
            background:white;
            padding:50px;
            border-radius:15px;
            text-align:center;
            width:450px;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
            animation:fadeIn 1s ease;
        }

        h1{
            font-size:90px;
            color:#2563eb;
        }

        h2{
            margin:10px 0;
            color:#333;
        }

        p{
            color:#666;
            margin:20px 0;
            line-height:1.6;
        }

        a{
            display:inline-block;
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:12px 30px;
            border-radius:8px;
            transition:.3s;
            font-weight:bold;
        }

        a:hover{
            background:#0f172a;
            transform:scale(1.05);
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(-40px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>

        <h2>Page Not Found</h2>

        <p>
            Sorry! The page you are looking for doesn't exist
            or has been moved.
        </p>

        <a href="/">Go Back Home</a>
    </div>

</body>
</html>
